name: Build Xournal++
inputs:
  build_type:
    required: true
    type: string
  cmake_flags:
    default: ''
    type: string
    required: false
  install_path:
    required: true
    type: string

runs:
  using: composite
  steps:
  - name: 'Build Xournal++'
    shell: bash
    run: |
      export PATH="$HOME/.local/bin":"${{inputs.install_path}}/gtk/inst/bin":${PATH}
      # Based on $PKG_CONFIG_PATH in the jhbuild shell
      # There is also a pyenv Python pkgconfig path, but we don't need it...right?
      export PKG_CONFIG_PATH="${{inputs.install_path}}/gtk/inst/lib/pkgconfig":"${{inputs.install_path}}/gtk/inst/share/pkgconfig"
      export PREFIX="${{inputs.install_path}}/gtk/inst"
      mkdir -p build
      cd build
      cmake -GNinja -DCMAKE_INSTALL_PREFIX="${{inputs.install_path}}/gtk/inst" -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} .. ${{ inputs.cmake_flags }}
      # Make sure pot is up to date with sources (maybe translation pipeline is currently running)
      cmake --build . --target pot
      cmake --build . --target translations
      # Build Xournal++
      cmake --build .
      cmake --build . --target install



