name: Build

on:
  pull_request:
    branches: [ "master", "release-*" ]
    ignores-paths:
      - 'po/xournalpp.pot'
      - 'po/*.po'

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug
  GCC_VERSION: 10

jobs:
  ubuntu-20_04:
    runs-on: ubuntu-20.04
    name: 'Test Xournal++ on Ubuntu 20.04'
    steps:
      - uses: actions/checkout@v4
      - name: 'Install dependencies'
        uses: ./.github/actions/install_deps_ubuntu
        with:
          gcc_version: ${{env.GCC_VERSION}}
      - name: 'Build Xournal++'
        uses: ./.github/actions/build_linux
        with:
          gcc_version: ${{env.GCC_VERSION}}
          build_type: ${{env.BUILD_TYPE}}
          cmake_flags: '-DCMAKE_DEBUG_INCLUDES_LDFLAGS=ON -DENABLE_GTEST=ON -DDOWNLOAD_GTEST=on'
      - name: 'Generate test locales'
        run: |
          echo "de_DE.UTF-8 UTF-8" | sudo tee /etc/locale.gen
          sudo locale-gen
      - name: 'Run tests'
        run: |
          cmake --build . --target test-units
          CI=true ./test/test-units
        working-directory: ${{github.workspace}}/build
      - name: 'Run gtk-integration tests'
        run: |
          sudo apt install xvfb
          cmake .. -DCMAKE_INSTALL_PREFIX=install
          cmake --build . --target install
          cmake --build . --target test-gtk-integration
          CI=true xvfb-run -a ./test/test-gtk-integration
        working-directory: ${{github.workspace}}/build
  Windows-2019:
    runs-on: windows-2019
    name: 'Test Xournal++ on Windows'
    steps:
      - uses: actions/checkout@v4
      - name: 'Build Xournal++'
        uses: ./.github/actions/build_windows
        with:
          build_type: ${{env.BUILD_TYPE}}
          cmake_flags: '-GNinja -DCMAKE_DEBUG_INCLUDES_LDFLAGS=ON -DENABLE_GTEST=ON -DDOWNLOAD_GTEST=on'
      - name: 'Run tests'
        shell: msys2 {0}
        run: |
          cmake --build . --target test-units
          CI=true ./test/test-units
        working-directory: ${{github.workspace}}/build
  MacOS-12:
    runs-on: macos-12
    name: 'Test Xournal++ on MacOS-12'
    steps:
      - uses: actions/checkout@v4
      - name: 'Build Xournal++'
        uses: ./.github/actions/build_mac
        with:
          build_type: ${{env.BUILD_TYPE}}
          cmake_flags: '-GNinja -DCMAKE_DEBUG_INCLUDES_LDFLAGS=ON -DENABLE_GTEST=ON -DDOWNLOAD_GTEST=on'
          generation_path: '/Users/xournal-dev'
      - name: 'Run tests'
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:/Users/xournal-dev/gtk/inst/bin:$PATH"
          cmake --build . --target test-units
          CI=true ./test/test-units
        working-directory: ${{github.workspace}}/build
  MacOS-13-Intel:
    runs-on: macos-13
    name: 'Test Xournal++ on MacOS-13'
    steps:
      - uses: actions/checkout@v4
      - name: 'Build Xournal++'
        uses: ./.github/actions/build_mac_arm
        with:
          build_type: ${{env.BUILD_TYPE}}
          cmake_flags: '-GNinja -DCMAKE_DEBUG_INCLUDES_LDFLAGS=ON -DENABLE_GTEST=ON -DDOWNLOAD_GTEST=on'
          install_path: $HOME
      - name: 'Run tests'
        shell: bash
        run: |
          export PATH="$HOME/gtk/inst/bin:$PATH"
          cmake --build . --target test-units
          CI=true ./test/test-units
        working-directory: ${{github.workspace}}/build
  MacOS-14-ARM:
    runs-on: macos-14
    name: 'Test Xournal++ on MacOS-14 ARM'
    steps:
      - uses: actions/checkout@v4
      - name: 'Build Xournal++'
        uses: ./.github/actions/build_mac_arm
        with:
          build_type: ${{env.BUILD_TYPE}}
          cmake_flags: '-GNinja -DCMAKE_DEBUG_INCLUDES_LDFLAGS=ON -DENABLE_GTEST=ON -DDOWNLOAD_GTEST=on'
          install_path: $HOME
      - name: 'Run tests'
        shell: bash
        run: |
          export PATH="$HOME/gtk/inst/bin:$PATH"
          cmake --build . --target test-units
          CI=true ./test/test-units
        working-directory: ${{github.workspace}}/build
