name: Create Installers

on:
  workflow_dispatch:
    inputs:
      build_ubuntu_20_04:
        description: 'Ubuntu 20.04'
        required: false
        default: false
        type: boolean
      build_ubuntu_22_04:
        description: 'Ubuntu 22.04'
        required: false
        default: false
        type: boolean
      build_ubuntu_24_04:
        description: 'Ubuntu 24.04'
        required: false
        default: false
        type: boolean
      # build_windows:
      #   description: 'Windows'
      #   required: false
      #   default: false
      #   type: boolean
      # build_macos_13:
      #   description: 'MacOS Intel'
      #   required: false
      #   default: false
      #   type: boolean
      # build_macos_14:
      #   description: 'MacOS ARM'
      #   required: false
      #   default: false
      #   type: boolean

jobs:
  create-installer-ubuntu-20_04:
    if: inputs.build_ubuntu_20_04 == 'true'
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/release_ubuntu
        with:
          gcc_version: 10
          ubuntu_version: 20.04
          build_appimage: true
  create-installer-ubuntu-22_04:
    if: inputs.build_ubuntu_22_04 == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/release_ubuntu
        with:
          gcc_version: 10
          ubuntu_version: 22.04
          build_appimage: true
  create-installer-ubuntu-24_04:
    if: inputs.build_ubuntu_24_04 == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/release_ubuntu
        with:
          gcc_version: 10
          ubuntu_version: 24.04
          build_appimage: true

