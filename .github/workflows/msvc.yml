name: MSVC

# Controls when the workflow will run
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: 'Attempt to pull blob from cache'
        id: restore-blob
        uses: actions/cache/restore@v4
        with:
          path: "${{github.workspace}}/gtk-blob"
          key: ${{ runner.os }}-${{ runner.arch }}-blob
      - uses: actions/checkout@v4
        if: steps.restore-blob.outputs.cache-hit != 'true'
        with:
          path: gvsbuild
          repository: wingtk/gvsbuild
          ref: main
      - name: Install gvsbuild and deps
        if: steps.restore-blob.outputs.cache-hit != 'true'
        run: python -m pip install wheel build .
        working-directory: gvsbuild
      - name: Move git binary
        if: steps.restore-blob.outputs.cache-hit != 'true'
        # Temporarily move preinstalled git to prevent errors related to cygwin.
        run: Rename-Item "C:\Program Files\Git\usr\bin" notbin
      - name: Build
        if: steps.restore-blob.outputs.cache-hit != 'true'
        run: >
          gvsbuild build
          --build-dir=${{ github.workspace }}\gtk-build
          --patches-root-dir=${{ github.workspace }}\gvsbuild\gvsbuild\patches
          gtk3 gtksourceview4 hicolor-icon-theme adwaita-icon-theme
        working-directory: gvsbuild
      - name: Restore git binary
        if: steps.restore-blob.outputs.cache-hit != 'true'
        run: Rename-Item  "C:\Program Files\Git\usr\notbin" bin
      - name: Zip Bundle
        if: steps.restore-blob.outputs.cache-hit != 'true'
        run: >
          7z a
          ${{ github.workspace }}\gtk-blob\${{ env.release_name }}.zip
          "${{ github.workspace }}\gtk-build\gtk\x64\release"
        env:
          release_name: "gtk-blob"
      - name: 'Push blob to cache'
        if: steps.restore-blob.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          key: ${{ steps.restore-blob.outputs.cache-primary-key }}
          path: "${{github.workspace}}/gtk-blob"
