name: MSVC

# Controls when the workflow will run
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Install boost
        uses: MarkusJx/install-boost@v2.4.5
        id: install-boost
        with:
            # REQUIRED: Specify the required boost version
            # A list of supported versions can be found here:
            # https://github.com/MarkusJx/prebuilt-boost/blob/main/versions-manifest.json
            boost_version: 1.86.0
            platform_version: 2022
            toolset: msvc
      - name: 'Attempt to pull blob from cache'
        id: restore-blob
        uses: actions/cache/restore@v4
        with:
          path: "${{github.workspace}}/build-dir"
          key: ${{ runner.os }}-${{ runner.arch }}-blob-poppler-2
      - uses: actions/checkout@v4
        with:
          path: gvsbuild
          repository: bhennion/gvsbuild
          ref: main
      - name: Install gvsbuild and deps
        run: |
          python -m pip install wheel build
          python -m pip install .
        working-directory: gvsbuild
      - name: Move git binary
        # Temporarily move preinstalled git to prevent errors related to cygwin.
        run: Rename-Item "C:\Program Files\Git\usr\bin" notbin
      - name: Build deps
        run: >
          gvsbuild build
          --build-dir=${{ github.workspace }}\build-dir
          --fast-build
          --patches-root-dir=${{ github.workspace }}\gvsbuild\gvsbuild\patches
          freetype glib libjpeg-turbo zlib libtiff-4 cairo fontconfig
          gtk3 gtksourceview4 hicolor-icon-theme adwaita-icon-theme portaudio
        working-directory: gvsbuild
      - name: 'Push blob to cache'
        uses: actions/cache/save@v4
        with:
          key: ${{ steps.restore-blob.outputs.cache-primary-key }}
          path: "${{github.workspace}}/build-dir"
      - name: Build poppler
        run: >
          gvsbuild build
          --build-dir=${{ github.workspace }}\build-dir
          --patches-root-dir=${{ github.workspace }}\gvsbuild\gvsbuild\patches
          poppler
        env:
          BOOST_ROOT: ${{ steps.install-boost.outputs.BOOST_ROOT }}
        working-directory: gvsbuild
